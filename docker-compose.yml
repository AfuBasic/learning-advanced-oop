services:
  # The PHP 8.5 Application Environment
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php_orm_app
    volumes:
      - .:/var/www
    environment:
      - DB_HOST=db
      - DB_PORT=3317
      - DB_DATABASE=custom_orm
      - DB_USERNAME=root
      - DB_PASSWORD=password
    depends_on:
      db:
        condition: service_healthy

  # The Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: php_orm_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # The Isolated Database Instance
  db:
    image: mysql:8.0
    container_name: php_orm_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: custom_orm
      MYSQL_USER: ormapp # Tells MySQL to create this user
      MYSQL_PASSWORD: password
    ports:
      - "3317:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p",
          "root_secret",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
